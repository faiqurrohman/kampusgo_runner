name: kampusgo
description: KAMPUSGO - aplikasi mobile manajemen kehidupan kampus untuk mahasiswa.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  url_launcher: ^6.3.0
  google_fonts: ^6.2.1

# Untuk versi produksi selanjutnya bisa ditambahkan Firebase:
# firebase_core: ^3.6.0
# firebase_auth: ^5.3.1
# cloud_firestore: ^5.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
